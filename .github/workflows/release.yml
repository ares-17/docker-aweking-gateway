name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to ghcr.io

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ares-17/docker-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/ares-17/docker-gateway:${{ github.ref_name }}
            ```

            ## Quick Start

            ```yaml
            services:
              gateway:
                image: ghcr.io/ares-17/docker-gateway:${{ github.ref_name }}
                ports:
                  - "8080:8080"
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock:ro
                  - ./config.yaml:/etc/gateway/config.yaml:ro
                environment:
                  - CONFIG_PATH=/etc/gateway/config.yaml
                restart: unless-stopped
            ```
